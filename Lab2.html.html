<!DOCTYPE html>
<html>
<head>
    <style>
        /* Task 4: Set table width to 100% */
        table {
            width: 100%;
            /* Task 3 & 13: Using collapse and radius logic */
            border-collapse: collapse; 
            font-family: Arial, sans-serif;
            border: 1px solid #ddd;
        }

        /* Task 8: Add cell padding */
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        /* Styling for the Blue Header shown in Task 14 output */
        th {
            background-color: #004080;
            color: white;
        }

        /* Task 6: Create Horizontal Zebra Stripes */
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        /* Task 12: Create Hoverable Effect using the suggested hex */
        tr:hover {
            background-color: #D6EEEE;
        }

        /* Task 4: Set first column width to 50% as requested in earlier tasks */
        th:first-child {
            width: 50%;
        }
    </style>
</head>
<body>

    <h2>University Student Records</h2>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Major</th>

</body>
</html>
